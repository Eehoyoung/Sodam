# =============================================================================
# 소담 — 개발용 풀스택 docker compose
#
# 사용법:
#   docker compose up -d              # 전체 기동
#   docker compose logs -f sodam-be   # BE 로그 추적
#   docker compose down               # 정지 (볼륨 유지)
#   docker compose down -v            # 정지 + 볼륨 삭제 (DB 초기화)
#
# 포트 매핑 (8080/8081/8082/5432/6379 등 타 프로젝트 점유 회피, BE 7070 일관):
#   - BE      : 7070  (호스트) → 7070 (컨테이너)   — 전 구간 7070 통일
#   - MySQL   : 13306 (호스트) → 3306 (컨테이너)
#   - Redis   : 16379 (호스트) → 6379 (컨테이너)
#   - Adminer : 18080 (호스트) → 8080 (컨테이너, 이미지 기본)
# =============================================================================

services:
  # ---------- BE 백엔드 ----------
  sodam-be:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sodam-be
    restart: unless-stopped
    depends_on:
      sodam-mysql:
        condition: service_healthy
      sodam-redis:
        condition: service_started
    environment:
      # Spring 프로필 — dev (H2 사용) 또는 prod (MySQL 사용)
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 7070
      # DB 연결 — MySQL 컨테이너 호스트
      DB_URL: jdbc:mysql://sodam-mysql:3306/sodam?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: sodam
      DB_PASSWORD: ${SODAM_DB_PASSWORD:-sodam_dev_pass}
      DB_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      # Redis
      REDIS_HOST: sodam-redis
      REDIS_PORT: 6379
      # JWT — 컨테이너 운영용 32바이트+ 시크릿 (운영은 Secrets Manager)
      JWT_SECRET: ${SODAM_JWT_SECRET:-Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdGhpcy1pcy0zMi1ieXRlcy1taW4=}
      # PII 암호화 키(AES-256-GCM) — phone·사업자번호 등 개인정보 컬럼 암호화 저장(PIPA §29).
      #   미설정 시 평문 모드(dev/test 허용, 운영 금지). 운영은 .env 에 SODAM_PII_KEY=<랜덤 32바이트 Base64> 주입.
      SODAM_SECURITY_PII_ENCRYPTION_KEY: ${SODAM_PII_KEY:-sodam-dev-pii-key-change-in-production}
      # PII 블라인드 인덱스(§2.6) HMAC 페퍼 — encryption-key와 반드시 별도 시크릿(키 분리).
      #   prod 프로필은 미설정 시 부팅을 거부한다(fail-fast) — 이 compose는 로컬용이라 기본값을 둔다.
      #   운영은 .env 에 SODAM_PII_SEARCH_PEPPER=<랜덤 32바이트 Base64> 주입(encryption-key와 다른 값).
      SODAM_SECURITY_PII_SEARCH_PEPPER: ${SODAM_PII_SEARCH_PEPPER:-sodam-dev-pii-search-pepper-change-in-production}
      # 단위: 초/일 (yaml token-validity-in-seconds / refresh-token-validity-in-days 와 일치)
      JWT_TOKEN_VALIDITY_SECONDS: 3600
      JWT_REFRESH_VALIDITY_DAYS: 7
      # 외부 통합 — 출시 직전까지 mock 모드 유지
      SODAM_INTEGRATION_TOSS_MODE: ${SODAM_TOSS_MODE:-mock}
      # ⭐ 토스 실키 활성화: .env 에 SODAM_TOSS_MODE=live + 아래 3개 키 입력 → compose up --build 만 하면 됨
      #    (mock 모드에선 test_ck_dev/test_sk_dev 디폴트로 동작, 실호출 없음)
      TOSS_CLIENT_KEY: ${TOSS_CLIENT_KEY:-test_ck_dev}
      TOSS_SECRET_KEY: ${TOSS_SECRET_KEY:-test_sk_dev}
      TOSS_WEBHOOK_SECRET: ${TOSS_WEBHOOK_SECRET:-}
      SODAM_INTEGRATION_FCM_MODE: ${SODAM_FCM_MODE:-mock}
      SODAM_INTEGRATION_SENTRY_MODE: ${SODAM_SENTRY_MODE:-off}
      SODAM_INTEGRATION_KAKAO_MODE: ${SODAM_KAKAO_MODE:-mock}
      # 카카오 (실 키 받으면 env 로 주입)
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-dev-mock}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-dev-mock-secret}
      # 타임존
      TZ: Asia/Seoul
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75"
      # 운영 yml 부재 fallback — actuator health 노출
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
      # DB_OPTIMIZATION_PLAN.md Phase 3(2026-07-07 사용자 확정, 이 계획서의 다른 모든 Phase 완료 후 착수) —
      # 로컬 docker-compose도 운영과 동일하게 Flyway가 스키마를 관리하도록 전환한다. 기존
      # SPRING_JPA_HIBERNATE_DDL_AUTO=update는 Flyway를 완전히 우회해 V파일 누락을 육안으로 확인하기
      # 어렵게 만들었다(§2.3) — validate로 전환해 "엔티티와 스키마가 어긋나면 부팅 실패"로 즉시 드러나게
      # 한다. 기존 로컬 볼륨은 ddl-auto=update로 누적된 상태라 flyway_schema_history가 없으므로
      # baseline-on-migrate + baseline-version으로 첫 부팅 시 자동 baseline한다(V51까지 이미 반영된
      # 상태로 간주 — 신규 V파일은 V52부터).
      DDL_AUTO: validate
      FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "51"
    ports:
      - "${SODAM_BE_PORT:-7070}:7070"
    volumes:
      - sodam_uploads:/app/uploads
      - sodam_logs:/app/logs
    networks:
      - sodam-network
    healthcheck:
      # /actuator/health 는 일부 빈 의존성 실패 시 등록 안 됨. info 는 stateless 이라 안전.
      test: ["CMD", "curl", "-fsS", "http://localhost:7070/actuator/info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ---------- MySQL ----------
  sodam-mysql:
    image: mysql:8.0.36
    container_name: sodam-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${SODAM_DB_ROOT_PASSWORD:-root_dev_pass}
      MYSQL_DATABASE: sodam
      MYSQL_USER: sodam
      MYSQL_PASSWORD: ${SODAM_DB_PASSWORD:-sodam_dev_pass}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --slow-query-log=1
      - --long-query-time=2
      # DB_OPTIMIZATION_PLAN.md Phase 8 — MySQL 기본값(128MB)은 로컬 개발 전용 디폴트라 부하테스트
      # 결과가 디스크 I/O 병목에 파묻힌다. 실제 운영 인스턴스 사양이 아직 확정되지 않아, 소상공인
      # SaaS 초기 규모(2 vCPU/4GB급 관리형 DB 인스턴스를 가정)에서 통상적인 "물리 메모리의 50~70%"
      # 가이드라인을 적용해 1GB로 설정했다 — 실제 운영 인스턴스 스펙이 정해지면 이 값을 그에 맞춰
      # 재조정할 것(가정값이며 확정 사양 아님).
      - --innodb-buffer-pool-size=1073741824
    ports:
      - "${SODAM_DB_PORT:-13306}:3306"
    volumes:
      - sodam_mysql_data:/var/lib/mysql
    networks:
      - sodam-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${SODAM_DB_ROOT_PASSWORD:-root_dev_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------- Redis ----------
  sodam-redis:
    image: redis:7-alpine
    container_name: sodam-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${SODAM_REDIS_PORT:-16379}:6379"
    volumes:
      - sodam_redis_data:/data
    networks:
      - sodam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- Adminer (DB GUI) ----------
  sodam-adminer:
    image: adminer:4.8.1
    container_name: sodam-adminer
    restart: unless-stopped
    depends_on:
      - sodam-mysql
    environment:
      ADMINER_DEFAULT_SERVER: sodam-mysql
      ADMINER_DESIGN: pepa-linha
    ports:
      - "${SODAM_ADMINER_PORT:-18080}:8080"
    networks:
      - sodam-network

# ---------- Volumes ----------
volumes:
  sodam_mysql_data:
    driver: local
  sodam_redis_data:
    driver: local
  sodam_uploads:
    driver: local
  sodam_logs:
    driver: local

# ---------- Network ----------
networks:
  sodam-network:
    driver: bridge
    name: sodam-network
