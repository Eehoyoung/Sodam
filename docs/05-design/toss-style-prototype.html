<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>소담 — 토스식 프로토타입 (홈 · 출퇴근)</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net"/>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
  :root{
    --primary:#FF6B35; --primaryDark:#E85A2A; --primarySoft:#FFF0E8;
    --secondary:#243B4A; --accent:#F4A261;
    --canvas:#F7F4EF; --surface:#FFFFFF; --warm:#FFFBF5;
    --text:#201A17; --text2:#625B55; --text3:#9A9189; --divider:#EFE7DF;
    --success:#12A87B; --warning:#F59E0B; --error:#E5484D;
    --tabbar:rgba(255,255,255,.82); --shadow:rgba(36,59,74,.16);
  }
  .dark{
    --primary:#FF7A45; --primarySoft:#3A2A22; --secondary:#9FB6C4;
    --canvas:#161311; --surface:#241F1B; --warm:#241F1B;
    --text:#F2ECE6; --text2:#B6ADA4; --text3:#8A817A; --divider:#2E2823;
    --tabbar:rgba(28,24,21,.82); --shadow:rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;font-family:Pretendard,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;margin:0;}
  body{background:#E7E1D9;display:flex;flex-direction:column;align-items:center;gap:14px;padding:26px 16px 40px;min-height:100vh;}
  .topbar{display:flex;gap:12px;align-items:center;color:#3a3330;font-size:13px;}
  .toggle{cursor:pointer;background:#fff;border:0;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;
          box-shadow:0 2px 8px rgba(36,59,74,.12);}
  /* phone */
  .phone{width:380px;height:800px;background:var(--canvas);border-radius:42px;border:10px solid #100c0a;
         overflow:hidden;box-shadow:0 24px 60px var(--shadow);position:relative;transition:background .35s;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:26px;background:#100c0a;
         border-radius:0 0 18px 18px;z-index:30;}
  .scrwrap{position:absolute;inset:0;}
  .screen{position:absolute;inset:0;padding:54px 26px 110px;display:flex;flex-direction:column;
          opacity:0;transform:translateX(14px);pointer-events:none;transition:opacity .32s, transform .32s;}
  .screen.active{opacity:1;transform:none;pointer-events:auto;}
  .muted{color:var(--text2);} .t3{color:var(--text3);}

  /* HOME */
  .greet{font-size:18px;color:var(--text2);}
  .store{font-size:15px;color:var(--text3);margin-top:2px;}
  .heroLabel{font-size:16px;color:var(--text2);margin-top:54px;}
  .hero{font-size:54px;font-weight:800;letter-spacing:-2px;line-height:1.02;margin-top:8px;color:var(--text);}
  .hero small{font-size:30px;font-weight:800;}
  .heroSub{font-size:15px;color:var(--text3);margin-top:14px;}
  .pill{display:inline-flex;align-items:center;gap:9px;background:var(--surface);border-radius:999px;padding:13px 18px;
        font-size:14.5px;color:var(--text2);box-shadow:0 4px 16px var(--shadow);margin-top:34px;width:fit-content;
        cursor:pointer;transition:transform .12s;}
  .pill:active{transform:scale(.97);}
  .pdot{width:9px;height:9px;border-radius:50%;background:var(--warning);box-shadow:0 0 0 4px color-mix(in srgb,var(--warning) 22%,transparent);}
  .spacer{flex:1;}
  .cta{position:absolute;left:26px;right:26px;bottom:96px;}
  .btn{display:block;width:100%;height:58px;border:0;border-radius:18px;font-size:17px;font-weight:700;cursor:pointer;
       transition:transform .12s, box-shadow .2s;}
  .btn.primary{background:var(--primary);color:#fff;box-shadow:0 10px 26px color-mix(in srgb,var(--primary) 40%,transparent);}
  .btn.primary:active{transform:scale(.975);}
  .btn.ghost{background:transparent;color:var(--text2);height:46px;font-weight:600;font-size:15px;margin-top:6px;}

  /* ATTENDANCE */
  .att{align-items:center;}
  .topstore{font-size:15px;color:var(--text3);align-self:flex-start;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;}
  .bigbtn{width:230px;height:230px;border-radius:50%;background:var(--primary);color:#fff;font-size:30px;font-weight:800;
          display:flex;align-items:center;justify-content:center;cursor:pointer;
          box-shadow:0 22px 50px color-mix(in srgb,var(--primary) 45%,transparent);
          transition:transform .18s cubic-bezier(.34,1.56,.64,1), background .3s;position:relative;}
  .bigbtn:active{transform:scale(.94);}
  .bigbtn.done{background:var(--success);box-shadow:0 22px 50px color-mix(in srgb,var(--success) 45%,transparent);}
  .ripple{position:absolute;inset:0;border-radius:50%;border:3px solid var(--primary);opacity:0;}
  .ripple.go{animation:rip .7s ease-out;}
  @keyframes rip{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.5);opacity:0}}
  .bigsub{margin-top:30px;font-size:16px;color:var(--text2);text-align:center;line-height:1.5;}
  .checkmark{font-size:64px;}

  /* tab bar */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:84px;display:flex;backdrop-filter:blur(16px);
          background:var(--tabbar);border-top:1px solid var(--divider);z-index:20;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;
       color:var(--text3);font-size:11.5px;font-weight:600;padding-top:8px;}
  .tab.on{color:var(--primary);}
  .tab .ic{width:24px;height:24px;border-radius:7px;border:2.4px solid currentColor;}
  .tab.on .ic{background:var(--primary);border-color:var(--primary);}
  .cap{font-size:12px;color:#6b6258;text-align:center;max-width:380px;line-height:1.5;}
</style>
</head>
<body>
  <div class="topbar">
    <strong>소담 · 토스식 프로토타입</strong>
    <button class="toggle" id="themeBtn">🌙 다크</button>
  </div>

  <div class="phone" id="phone">
    <div class="notch"></div>
    <div class="scrwrap">

      <!-- 홈 -->
      <section class="screen active" id="home">
        <div class="greet">은영 사장님, 좋은 아침이에요</div>
        <div class="store">소담 데모 카페</div>
        <div class="heroLabel">9월 예상 인건비</div>
        <div class="hero"><span id="counter">0</span><small>원</small></div>
        <div class="heroSub">지난달보다 <b style="color:var(--text2)">12만원</b> 늘었어요</div>
        <div class="pill" onclick="go('att')"><span class="pdot"></span> 지훈님 오늘 아직 미출근 · 확인하기</div>
        <div class="spacer"></div>
        <div class="cta">
          <button class="btn primary">9월 급여 정산하기</button>
          <button class="btn ghost">매장 · 직원 관리</button>
        </div>
      </section>

      <!-- 출퇴근 -->
      <section class="screen att" id="att">
        <div class="topstore">소담 데모 카페 · NFC·GPS 준비됨</div>
        <div class="center">
          <div class="bigbtn" id="punch" onclick="punch()">
            <span class="ripple" id="ripple"></span>
            <span id="punchText">출근</span>
          </div>
          <div class="bigsub" id="punchSub">버튼을 탭하면 출근이 기록돼요</div>
        </div>
      </section>

    </div>

    <!-- 하단 탭 -->
    <nav class="tabbar">
      <div class="tab on" id="tabHome" onclick="go('home')"><span class="ic"></span>홈</div>
      <div class="tab" id="tabAtt" onclick="go('att')"><span class="ic"></span>출퇴근</div>
      <div class="tab"><span class="ic"></span>급여</div>
      <div class="tab"><span class="ic"></span>더보기</div>
    </nav>
  </div>

  <p class="cap">실제 토큰·데이터 의미 적용 · 한 화면=한 가지 · 숫자 카운트업 · 거대 단일 액션 · 라이트/다크 토글.<br>버튼·탭·출근 버튼을 직접 눌러보세요.</p>

<script>
  // 숫자 카운트업
  function countUp(el, target, ms){
    const start=performance.now();
    function tick(now){
      const p=Math.min(1,(now-start)/ms);
      const e=1-Math.pow(1-p,3); // easeOutCubic
      el.textContent=Math.floor(target*e).toLocaleString('ko-KR');
      if(p<1)requestAnimationFrame(tick); else el.textContent=target.toLocaleString('ko-KR');
    }
    requestAnimationFrame(tick);
  }
  function runHomeCount(){ countUp(document.getElementById('counter'),3120000,900); }
  runHomeCount();

  // 화면 전환
  function go(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
    document.getElementById('tabHome').classList.toggle('on',id==='home');
    document.getElementById('tabAtt').classList.toggle('on',id==='att');
    if(id==='home') runHomeCount();
  }

  // 출근 버튼
  let punched=false;
  function punch(){
    const b=document.getElementById('punch'), txt=document.getElementById('punchText'),
          sub=document.getElementById('punchSub'), rip=document.getElementById('ripple');
    rip.classList.remove('go'); void rip.offsetWidth; rip.classList.add('go');
    if(punched) return;
    punched=true;
    setTimeout(()=>{
      b.classList.add('done');
      txt.innerHTML='<span class="checkmark">✓</span>';
      const t=new Date(); const hh=String(t.getHours()).padStart(2,'0'), mm=String(t.getMinutes()).padStart(2,'0');
      sub.innerHTML='<b style="color:var(--success)">'+hh+':'+mm+' 출근 완료</b><br>오늘도 좋은 하루 보내세요, 사장님';
    },180);
  }

  // 테마 토글
  const btn=document.getElementById('themeBtn');
  btn.onclick=()=>{
    const d=document.body.classList.toggle('dark');
    btn.textContent=d?'☀️ 라이트':'🌙 다크';
  };
</script>
</body>
</html>
