openapi: 3.0.3
info:
  title: SODAM PersonalUser API
  version: 0.1.2
  description: |
    Personal 모드 전용 API 명세(v0.1). Phase A/B 범위의 최소 구현 기준.
    - 네임스페이스: /api/personal-users/{userId}
    - 인증: Bearer JWT (token.userId == path userId), 관리자(ROLE_MASTER|ROLE_MANAGER) 예외 허용
    - 역할: ROLE_PERSONAL (개인 모드 기본 권한)
    - 응답: 기본 ApiResponse 래퍼 { success, message, data, errorCode, timestamp }
servers:
  - url: https://api.sodam.example.com
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/personal-users/{userId}:
    get:
      summary: 개인 사용자 프로필 조회
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePersonalUserProfile'
    put:
      summary: 개인 사용자 프로필 수정
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonalUserProfileUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePersonalUserProfile'
  /api/personal-users/{userId}/workplaces:
    get:
      summary: 개인 근무지 목록 조회(커서 기반)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: cursor
          required: false
          schema: { type: integer, format: int64 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkplacePage'
    post:
      summary: 개인 근무지 생성
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonalWorkplaceCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkplace'
  /api/personal-users/{userId}/workplaces/{workplaceId}:
    put:
      summary: 개인 근무지 수정
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/WorkplaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonalWorkplaceUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseWorkplace'
    delete:
      summary: 개인 근무지 삭제
      parameters:
        - $ref: '#/components/parameters/UserId'
        - $ref: '#/components/parameters/WorkplaceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDelete'
  /api/personal-users/{userId}/attendance:
    get:
      summary: 출퇴근 기록 조회(기간 + 커서 기반)
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: from
          required: false
          schema: { type: string, format: date }
        - in: query
          name: to
          required: false
          schema: { type: string, format: date }
        - in: query
          name: cursor
          required: false
          schema: { type: integer, format: int64 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 50, minimum: 1, maximum: 100 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendancePage'
  /api/personal-users/{userId}/attendance/monthly:
    get:
      summary: 월별 일자별 요약
      parameters:
        - $ref: '#/components/parameters/UserId'
        - in: query
          name: year
          required: true
          schema: { type: integer }
        - in: query
          name: month
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseMonthlySummary'
  /api/personal-users/{userId}/attendance/check-in:
    post:
      summary: 출근(수동) — 멱등성 적용
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendance'
      security:
        - bearerAuth: []
      x-idempotency:
        header: Idempotency-Key
        ttlHours: 24
  /api/personal-users/{userId}/attendance/check-out:
    post:
      summary: 퇴근(수동) — 멱등성 적용
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckOutRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAttendance'
      security:
        - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UserId:
      in: path
      name: userId
      required: true
      schema: { type: integer, format: int64 }
    WorkplaceId:
      in: path
      name: workplaceId
      required: true
      schema: { type: integer, format: int64 }
  schemas:
    ApiResponsePersonalUserProfile:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          $ref: '#/components/schemas/PersonalUserProfile'
    ApiResponseWorkplace:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          $ref: '#/components/schemas/PersonalWorkplace'
    ApiResponseDelete:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          type: object
          properties:
            deleted: { type: boolean }
    ApiResponseWorkplacePage:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          $ref: '#/components/schemas/WorkplacePage'
    ApiResponseAttendance:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          $ref: '#/components/schemas/PersonalAttendanceRecord'
    ApiResponseAttendancePage:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          $ref: '#/components/schemas/AttendancePage'
    ApiResponseMonthlySummary:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errorCode: { type: string, nullable: true }
        timestamp: { type: string }
        data:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              minutes: { type: integer }
              sessions: { type: integer }
    PersonalUserProfile:
      type: object
      properties:
        userId: { type: integer, format: int64 }
        nickname: { type: string, nullable: true }
        defaultHourlyWage: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    PersonalWorkplace:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        name: { type: string }
        address: { type: string, nullable: true }
        hourlyWage: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CheckInRequest:
      type: object
      properties:
        workplaceId: { type: integer, format: int64, nullable: true }
        timestamp: { type: string, format: date-time, nullable: true }
        note: { type: string, nullable: true }
    CheckOutRequest:
      type: object
      properties:
        sessionId: { type: integer, format: int64, nullable: true }
        timestamp: { type: string, format: date-time, nullable: true }
    PersonalAttendanceRecord:
      type: object
      properties:
        id: { type: integer, format: int64 }
        userId: { type: integer, format: int64 }
        workplaceId: { type: integer, format: int64, nullable: true }
        checkInAt: { type: string, format: date-time }
        checkOutAt: { type: string, format: date-time, nullable: true }
        durationMinutes: { type: integer, nullable: true }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    WorkplacePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PersonalWorkplace' }
        meta:
          $ref: '#/components/schemas/PageMeta'
    AttendancePage:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PersonalAttendanceRecord' }
        meta:
          allOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: object
              properties:
                totalMinutes: { type: integer, nullable: true }
                daysCount: { type: integer, nullable: true }
    PageMeta:
      type: object
      properties:
        nextCursor: { type: integer, format: int64, nullable: true }
        limit: { type: integer }
    PersonalUserProfileUpdateRequest:
      type: object
      properties:
        nickname: { type: string, nullable: true }
        settings:
          type: object
          properties:
            defaultHourlyWage: { type: integer, nullable: true }
    PersonalWorkplaceCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        address: { type: string, nullable: true }
        hourlyWage: { type: integer, nullable: true }
    PersonalWorkplaceUpdateRequest:
      type: object
      properties:
        name: { type: string, nullable: true }
        address: { type: string, nullable: true }
        hourlyWage: { type: integer, nullable: true }
