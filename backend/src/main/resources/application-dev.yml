# =============================================================================
# 소담 — 개발/에뮬레이터 프로필
# 외부 의존성 없이 H2 in-memory + Mock 외부서비스로 즉시 부팅 가능
# 사용: ./gradlew bootRun --args='--spring.profiles.active=dev'
# =============================================================================

server:
  port: 7070   # 8080 충돌 회피 (다른 프로젝트/Docker 점유 시 대비)

sentry:
  enabled: false   # SentryConfig 가 수동 init — Spring Boot Starter 자동 init 비활성

spring:
  # H2 in-memory DB (MySQL 호환 모드)
  datasource:
    url: jdbc:h2:mem:sodam;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        cache:
          use_second_level_cache: false
          use_query_cache: false
    show-sql: false

  # 캐시는 메모리(JCache simple) 또는 비활성
  cache:
    type: simple

  # Redis 옵셔널: 미동작 시 부팅 실패 방지를 위해 lettuce 클라이언트는 ConditionalOnProperty로 분기 처리
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 1000ms
      lettuce:
        shutdown-timeout: 100ms

  # SQL 초기화 끔 (H2에서 충돌 방지)
  sql:
    init:
      mode: never

  # Kakao OAuth — 미설정 허용 (Mock 사용)
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-mock-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-mock-client-secret}

# JWT — dev 전용 고정 시크릿 (운영 절대 사용 금지)
jwt:
  secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWtleS1jaGFuZ2UtbWUtaW4tcHJvZHVjdGlvbi1tdXN0LWJlLTMyLWJ5dGVz}
  token-validity-in-seconds: 3600
  refresh-token-validity-in-days: 7
  cookie-name: sodam_jwt
  cookie-max-age: 3600

# =============================================================================
# 외부 서비스 모드 토글
# dev 프로필: 전부 mock 으로 동작 → API 키 없이 부팅 가능
# =============================================================================
sodam:
  features:
    manager-delegation-enabled: true
  integration:
    toss:
      mode: mock              # mock | live
      client-key: ${TOSS_CLIENT_KEY:test_ck_dev}
      secret-key: ${TOSS_SECRET_KEY:test_sk_dev}
      base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}
      webhook-secret: ${TOSS_WEBHOOK_SECRET:dev-webhook}
    fcm:
      mode: mock              # mock | live
      project-id: ${FCM_PROJECT_ID:sodam-dev}
    sentry:
      mode: off               # off | live
      dsn: ${SENTRY_DSN:}
      environment: dev
      traces-sample-rate: 0.0
    kakao:
      mode: ${SODAM_INTEGRATION_KAKAO_MODE:mock} # mock | live (geocoding)
      base-url: ${KAKAO_BASE_URL:https://dapi.kakao.com}
      rest-api-key: ${KAKAO_REST_API_KEY:}
    channel-talk:
      mode: off
      plugin-key: ""
    electronic-signature:
      mode: mock
      provider: ${BAROCERT_PROVIDER:naver}
      allowed-return-scheme: ${BAROCERT_ALLOWED_RETURN_SCHEME:sodam}
      worker-enabled: true

logging:
  level:
    root: INFO
    com.rich.sodam: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

# 개발 편의: Swagger 활성, Actuator 풍부 노출
springdoc:
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,mappings
  endpoint:
    health:
      show-details: always

# 운영시간 외 매장 출근도 허용 (개발 편의)
app:
  store:
    default-radius: 100
    enforce-operating-hours: false
