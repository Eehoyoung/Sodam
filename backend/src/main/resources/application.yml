# 서버 포트 — 소담 일관 포트(7070). 8080 은 다른 프로젝트/Docker 점유 회피.
#   docker / 로컬 / dev 프로필 전 구간 7070 통일. SERVER_PORT env 로 override 가능.
server:
  port: ${SERVER_PORT:7070}

# 애플리케이션 설정
app:
  store:
    default-radius: ${STORE_DEFAULT_RADIUS:100}  # 출퇴근 인증 기본 반경(미터)
  redis:
    cache-database: ${REDIS_CACHE_DATABASE:1}    # 캐시용 Redis 데이터베이스 번호

sentry:
  enabled: false   # SentryConfig 에서 수동 초기화 — 자동 init 차단

spring:
  jmx:
    enabled: false  # JMX 비활성
  config:
    # .env 파일 우선순위: backend/.env → 루트/.env (monorepo 통합 후 권장)
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: sodam
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:#{null}}
            client-secret: ${KAKAO_CLIENT_SECRET:#{null}}
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:7070/kakao/auth/proc}
            authorization-grant-type: authorization_code
            client-authentication-method: POST
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id


  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sodam?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:#{null}}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create-drop}      # 운영 환경에서는 validate, 개발 환경에서는 create-drop 권장
    properties:
      hibernate:
        globally_quoted_identifiers: true   # 예약어(예: user) 테이블/컬럼명 자동 인용
        # 서버 비용 최적화를 위한 Hibernate 설정
        format_sql: false                 # 운영 환경에서는 비활성화 권장 (SQL 포맷팅 비용 절감)
        order_inserts: true               # 일괄 삽입 최적화
        order_updates: true               # 일괄 업데이트 최적화
        jdbc.batch_size: 30               # 배치 작업 크기 설정
        jdbc.batch_versioned_data: true   # 버전 관리 엔티티의 배치 처리 활성화
        query.in_clause_parameter_padding: true  # IN 절 파라미터 패딩 최적화
        query.plan_cache_max_size: 2048   # 쿼리 계획 캐시 크기 증가
        generate_statistics: false        # 통계 수집 비활성화 (성능 향상)
        cache:
          use_second_level_cache: true    # 2차 캐시 활성화
          use_query_cache: true           # 쿼리 캐시 활성화
          region.factory_class: org.hibernate.cache.jcache.JCacheRegionFactory
        javax:
          cache:
            missing_cache_strategy: create  # 누락된 캐시 영역 자동 생성
    open-in-view: false                   # OSIV 패턴 비활성화 (서버 리소스 최적화)
    show-sql: false                       # 운영 환경에서는 비활성화 권장 (로깅 비용 절감)
  aop:
    auto: true
    proxy-target-class: true
  transaction:
    default-timeout: 30s

  data:
    # Spring Data Web 설정 비활성화 (ProjectingArgumentResolverBeanPostProcessor 오류 방지)
    # web:
    #   pageable:
    #     default-page-size: 20
    #     max-page-size: 100
    #     page-parameter: page
    #     size-parameter: size
    #     prefix: ""
    #     qualifier-delimiter: _
    #     one-indexed-parameters: false
    #   sort:
    #     sort-parameter: sort

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
        shutdown-timeout: 100ms
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30분 기본 TTL
      cache-null-values: false
      key-prefix: "sodam:"
      use-key-prefix: true
  messages:
    basename: messages_base
    encoding: utf-8
    cache-duration: -1
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    filter: true
    groups-order: desc
    doc-expansion: none
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

jwt:
  secret: ${JWT_SECRET:#{null}}
  # ⚠️ 단위 주의: 아래 속성은 '초'/'일' 단위. ms 환경변수(JWT_EXPIRATION 등) 바인딩 금지
  #   (과거 ms 를 초/일에 바인딩해 refresh 만료가 165만년→MySQL datetime 크래시 발생, 수정됨)
  token-validity-in-seconds: ${JWT_TOKEN_VALIDITY_SECONDS:3600}        # 1시간 (액세스 토큰)
  refresh-token-validity-in-days: ${JWT_REFRESH_VALIDITY_DAYS:7}       # 7일 (리프레시 토큰)
  cookie-name: ${JWT_COOKIE_NAME:sodam_jwt}
  cookie-max-age: ${JWT_COOKIE_MAX_AGE:3600}                           # 1시간

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# 국세청 사업자등록번호 조회 API 설정
tax:
  office:
    api:
      key: ${NTS_API_KEY:#{null}}  # 국세청 API 키

# =============================================================================
# 외부 통합 (Toss / FCM / Sentry / Kakao / Channel) — 모드별 동작 토글
#
# ⭐ 토스 실키 받았을 때 활성화 순서 (3단계만):
#   1) .env 에 실키 입력
#        SODAM_TOSS_MODE=live
#        TOSS_CLIENT_KEY=live_ck_xxx          # 토스 대시보드 클라이언트 키
#        TOSS_SECRET_KEY=live_sk_xxx          # 토스 대시보드 시크릿 키 (Bearer)
#        TOSS_WEBHOOK_SECRET=<webhook_secret> # 토스 webhook 서명 검증
#   2) docker compose up -d --build sodam-be  # 환경변수 반영
#   3) 자동결제/취소가 LiveTossBillingClient 로 라우팅
#      (@ConditionalOnProperty mode=live + @PostConstruct 키검증, 빈 키면 부팅 실패)
# mock 으로 두면 LiveTossBillingClient 빈 생성 안되고 MockTossBillingClient 사용.
# =============================================================================
sodam:
  integration:
    toss:
      mode: ${SODAM_INTEGRATION_TOSS_MODE:mock}
      client-key: ${TOSS_CLIENT_KEY:test_ck_dev}
      secret-key: ${TOSS_SECRET_KEY:test_sk_dev}
      webhook-secret: ${TOSS_WEBHOOK_SECRET:}
      base-url: ${TOSS_BASE_URL:https://api.tosspayments.com}
    fcm:
      mode: ${SODAM_INTEGRATION_FCM_MODE:mock}
    sentry:
      mode: ${SODAM_INTEGRATION_SENTRY_MODE:off}
    kakao:
      mode: ${SODAM_INTEGRATION_KAKAO_MODE:mock}
      base-url: ${KAKAO_BASE_URL:https://dapi.kakao.com}
    channel:
      mode: ${SODAM_INTEGRATION_CHANNEL_MODE:off}
