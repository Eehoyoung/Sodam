# Flyway V1 baseline(MySQL DDL) 생성 전용 프로필.
# SchemaBaselineTest 가 이 프로필로 부팅하면 Hibernate 가 엔티티 메타데이터에서
# MySQL 방언 DDL 을 build/V1__baseline.sql 로 출력한다(DB 에 DDL 실행하지 않음).
spring:
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:schemagen;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        globally_quoted_identifiers: true
      jakarta:
        persistence:
          schema-generation:
            scripts:
              action: create
              create-target: build/generated/V1__baseline.sql
            create-source: metadata
